<!DOCTYPE html>
<html lang="en" ng-app="ProductManagementApp">
    <head>
        <title>angular product management app task</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
        <link href="./style.css" rel="stylesheet"/>
        <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.6.9/angular.min.js"></script>
        <script src="./app.js"></script>
    </head>
    <body>
        <main class="container" ng-controller="MainController">
            <div class="row">
                <div class="d-flex justify-content-center">
                    <h1 class="mt-4">Product Management App Task</h1>
                </div>
            </div>
            <div class="row d-flex justify-content-center">
                <div class="custom-container">
                    <div class="d-flex gap-3 align-items-end">
                        <div class="flex-grow-1">
                            <label for="title" class="label-text">Title</label>
                            <input type="text" class="form-control" id="title" placeholder="Enter product title" ng-model="title" ng-change="validateProduct()">
                        </div>
                        <div>
                            <label for="price" class="label-text">Price</label>
                            <input type="number" class="form-control price-input" id="price" placeholder="0" ng-model="price" ng-change="validateProduct()" min="0" step="0.01">
                        </div>
                        <div>
                            <label for="gender" class="label-text">Gender</label>
                            <select class="form-select gender-select" id="gender" ng-model="gender" ng-change="validateProduct()">
                                <option value="">Select gender</option>
                                <option value="men">Men</option>
                                <option value="women">Women</option>
                                <option value="unisex">Unisex</option>
                                <option value="kids">Kids</option>
                            </select>
                        </div>
                        <button type="button" class="btn btn-primary text-nowrap" ng-click="updatingProduct ? updateProduct() : addProduct()" ng-disabled="!title || title.length < 3 || !price || !gender">{{updatingProduct ? 'Update' : 'Add'}}</button>
                    </div>
                    <div ng-show="validationMessage" class="text-danger mt-3">{{validationMessage}}</div>
                </div>
            </div>
            <div class="row d-flex justify-content-center">
                <div class="custom-container">
                    <span class="d-flex justify-content-center" ng-show="loading">Loading...</span>
                    <span class="d-flex justify-content-center text-danger" ng-show="!loading && errorMessage">{{errorMessage}}</span>
                    <span class="d-flex justify-content-center" ng-show="!loading && !errorMessage && products.length == 0">No products added yet</span>
                    <div ng-show="!loading && !errorMessage && products.length > 0">
                        <div class="d-flex gap-2 mb-3">
                            <input type="text" class="form-control" placeholder="Search by title" ng-model="searchTitle">
                            <select class="form-select sort-select" ng-model="sortBy">
                                <option value="">None</option>
                                <option value="title">Sort by Title</option>
                                <option value="price">Sort by Price (Low to High)</option>
                                <option value="-price">Sort by Price (High to Low)</option>
                            </select>
                        </div>
                        <span class="d-flex justify-content-center" ng-show="filteredProducts.length == 0">No product found</span>
                        <table class="table" ng-show="filteredProducts.length > 0">
                            <thead>
                                <tr>
                                    <th scope="col">#</th>
                                    <th scope="col">Title</th>
                                    <th scope="col">Price</th>
                                    <th scope="col">Gender</th>
                                    <th scope="col">Action</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr ng-repeat="product in (filteredProducts = (products | filter:{title: searchTitle} | orderBy: sortBy)) track by $index">
                                    <th scope="row">{{$index+1}}</th>
                                    <td>{{product.title}}</td>
                                    <td>{{product.price | number:2 | currency}}</td>
                                    <td>{{product.gender}}</td>
                                    <td>
                                        <div class="d-flex gap-2">
                                            <button type="button" class="btn btn-warning text-nowrap" ng-click="editProduct(product)">Edit</button>
                                            <button type="button" class="btn btn-danger text-nowrap" ng-click="deleteProduct(product)">Delete</button>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
